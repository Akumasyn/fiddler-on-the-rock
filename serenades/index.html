<!DOCTYPE html>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0A0810;
    color: #F7EFE4;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 2rem;

  .container { max-width: 560px; width: 100%; }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #9a8fa8;

  }

    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    margin-bottom: 0.5rem;
  }

    font-size: 0.85rem;
    color: #9a8fa8;
    margin-bottom: 2.5rem;
    line-height: 1.6;
  }

  .versions { display: flex; flex-direction: column; gap: 0.75rem; }

  a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.1rem 1.25rem;
    border: 1px solid rgba(247, 239, 228, 0.12);
    color: #F7EFE4;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }

  a:hover {
    border-color: rgba(196, 80, 58, 0.5);
    background: rgba(196, 80, 58, 0.05);
  }

  .version-label {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #C4503A;
    margin-bottom: 0.25rem;
  }

  .version-title { font-size: 1rem; font-weight: 400; }

  .arrow { color: #9a8fa8; font-size: 0.85rem; flex-shrink: 0; margin-left: 1rem; }

</head>
<body>
<div class="container">
  <p class="eyebrow">Fiddler on the Rock</p>

  <div class="versions">
    <a href="serenades_v01.html">
      <div>
