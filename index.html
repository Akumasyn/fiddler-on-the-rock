<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiddler on the Rock — Site Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0A0810;
    color: #F7EFE4;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .container {
    max-width: 480px;
    width: 100%;
  }

  .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #9a8fa8;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    margin-bottom: 2.5rem;
    color: #F7EFE4;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border: 1px solid rgba(247, 239, 228, 0.12);
    color: #F7EFE4;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }

  a:hover {
    border-color: rgba(232, 151, 26, 0.5);
    background: rgba(232, 151, 26, 0.05);
  }

  .link-title {
    font-size: 0.95rem;
    font-weight: 400;
  }

  .link-desc {
    font-size: 0.75rem;
    color: #9a8fa8;
    margin-top: 0.2rem;
  }

  .arrow {
    color: #9a8fa8;
    font-size: 0.8rem;
  }

  .internal {
    border-style: dashed;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="container">
  <p class="eyebrow">Fiddler on the Rock</p>
  <h1>Site Directory</h1>
  <div class="links">
    <a href="/epk/">
      <div>
        <div class="link-title">EPK</div>
        <div class="link-desc">Electronic Press Kit → epk.fiddlerontherock.com</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="/serenades/">
      <div>
        <div class="link-title">Sedona Serenades</div>
        <div class="link-desc">Private romantic violin concert → serenades.fiddlerontherock.com</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="/packages/">
      <div>
        <div class="link-title">Packages</div>
        <div class="link-desc">Red Rock Nature Concert → packages.fiddlerontherock.com</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a href="/strategy/" class="internal">
      <div>
        <div class="link-title">Strategy</div>
        <div class="link-desc">Internal</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
</div>
</body>
</html>
